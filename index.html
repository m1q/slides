<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrameX Studio - Fixed Controls</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff6b4a; --dark: #0f0f10; --light: #f8f9fa; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px; /* مساحة للأزرار الثابتة */
        }

        /* شريط التحكم الثابت في الأعلى */
        .admin-controls {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 9999;
            border-bottom: 2px solid var(--accent);
        }

        .btn {
            padding: 10px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-family: 'Cairo';
        }
        .btn-nav { background: white; color: black; }
        .btn-download { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(255, 107, 74, 0.4); }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }

        /* حاوية التصميم (بقياس إنستغرام 4:5) */
        #capture-area {
            width: 1080px; 
            height: 1350px;
            background: var(--light);
            position: relative;
            overflow: hidden;
            /* تصغير العرض للمعاينة فقط دون التأثير على جودة الصورة عند التحميل */
            transform: scale(0.5); 
            transform-origin: top center;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        .slide { display: none; width: 100%; height: 100%; padding: 100px 80px; position: relative; flex-direction: column; justify-content: center; }
        .slide.active { display: flex; }

        /* التصميم البصري */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-right: 15px solid var(--accent);
            padding: 60px;
            border-radius: 40px;
            transform: rotate(-1.5deg);
        }
        .slide-dark .glass-panel { background: rgba(255, 255, 255, 0.05); border-color: var(--accent); color: white; }
        
        .h1-bold { font-size: 110px; font-weight: 900; line-height: 1.1; margin-bottom: 40px; }
        .tag-label { background: var(--accent); color: white; padding: 10px 40px; border-radius: 100px; font-size: 32px; font-weight: 800; display: inline-block; margin-bottom: 50px; }
        
        .floating-light { position: absolute; background: var(--accent); border-radius: 50%; filter: blur(120px); opacity: 0.2; }
    </style>
</head>
<body>

    <div class="admin-controls">
        <button class="btn btn-nav" onclick="prev()">السابق</button>
        <div style="color: white; font-weight: bold; font-size: 20px;" id="counter">1 / 3</div>
        <button class="btn btn-nav" onclick="next()">التالي</button>
        <button class="btn btn-download" onclick="downloadSlide()">تحميل الصورة (High Quality)</button>
    </div>

    <div id="capture-area">
        <div class="slide slide-dark active" style="background: var(--dark);" id="s1">
            <div class="floating-light" style="width: 600px; height: 600px; top: -100px; left: -100px;"></div>
            <div class="tag-label">FrameX Solution</div>
            <h1 class="h1-bold">إعلانك يوصل..<br><span style="color:var(--accent)">بس ما يبيع؟</span></h1>
            <p class="text-5xl opacity-80">نظام أتمتة ذكي يحول المشاهدات لطلبات حقيقية.</p>
        </div>

        <div class="slide" id="s2">
            <div class="tag-label" style="background: black;">المشكلة</div>
            <h1 class="h1-bold">عرضك <span style="color:var(--accent)">"عادي"</span></h1>
            <div class="glass-panel">
                <p class="text-6xl font-bold">الزبون العراقي ذكي.. إذا شاف عرضك مكرر راح يعبرك. إحنا نصيغ لك "اللقطة".</p>
            </div>
        </div>

        <div class="slide slide-dark" style="background: var(--dark);" id="s3">
            <div class="floating-light" style="width: 500px; height: 500px; bottom: -100px; right: -100px;"></div>
            <div class="tag-label">أتمتة 24/7</div>
            <h1 class="h1-bold">تأخرت دقيقة؟<br><span style="color:var(--accent)">طار الزبون.</span></h1>
            <div class="glass-panel">
                <p class="text-5xl leading-tight">البوت يرد ويثبت الحجز بـ ثانية وحدة.. حتى وأنت نايم محلّك شغال.</p>
            </div>
        </div>
    </div>

    <script>
        let current = 1;
        const total = 3;

        function update() {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById(`s${current}`).classList.add('active');
            document.getElementById('counter').innerText = `${current} / ${total}`;
        }

        function next() { if(current < total) { current++; update(); } }
        function prev() { if(current > 1) { current--; update(); } }

        function downloadSlide() {
            const area = document.getElementById('capture-area');
            // إرجاع الـ scale للأصل مؤقتاً لالتقاط صورة واضحة
            area.style.transform = "scale(1)";
            
            html2canvas(area, {
                scale: 1, // الصورة أصلاً كبيرة (1080x1350)
                logging: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `FrameX-Slide-${current}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                area.style.transform = "scale(0.5)"; // إعادة التصغير للمعاينة
            });
        }
    </script>
</body>
</html>
